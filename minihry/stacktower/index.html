<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Stack Tower</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,226,93,.9), transparent 27%),
        radial-gradient(circle at 84% 20%, rgba(80,220,255,.75), transparent 30%),
        radial-gradient(circle at 22% 84%, rgba(255,95,157,.72), transparent 30%),
        linear-gradient(135deg, #4c63ff, #1fc7a8);
      color: #fff;
      user-select: none;
      touch-action: manipulation;
    }

    .back {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      z-index: 20;
      padding: 10px 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      border-radius: 10px;
      background: rgba(0,0,0,.24);
      backdrop-filter: blur(8px);
    }

    .game {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: calc(58px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));
    }

    .hud {
      width: min(560px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .box {
      padding: 10px 8px;
      text-align: center;
      font-size: clamp(14px, 3.4vw, 20px);
      font-weight: 900;
      border-radius: 14px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.28);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(20,35,80,.16);
    }

    .arena {
      position: relative;
      width: min(560px, 100%);
      min-height: 0;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px),
        rgba(16,30,78,.24);
      background-size: 32px 32px;
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.1), 0 18px 44px rgba(14,30,80,.24);
      backdrop-filter: blur(10px);
    }

    .block {
      position: absolute;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff36e, #ff9f43);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -5px 0 rgba(0,0,0,.14), 0 8px 20px rgba(0,0,0,.18);
    }

    .block:nth-child(3n) { background: linear-gradient(180deg, #75f5ff, #2f86ff); }
    .block:nth-child(3n + 1) { background: linear-gradient(180deg, #ff9cca, #ff3f75); }

    .cut {
      position: absolute;
      height: 34px;
      border-radius: 8px;
      opacity: .95;
      animation: fall .55s ease-in forwards;
      pointer-events: none;
    }

    @keyframes fall {
      to { transform: translateY(190px) rotate(18deg); opacity: 0; }
    }

    .message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 420px);
      padding: 18px;
      text-align: center;
      border-radius: 18px;
      background: rgba(13,28,76,.8);
      border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 36px rgba(0,0,0,.22);
      font-size: clamp(17px, 4vw, 22px);
      font-weight: 900;
      line-height: 1.35;
      z-index: 10;
    }

    .hidden { display: none; }

    .controls {
      width: min(560px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 15px;
      padding: 15px 12px;
      color: #17305f;
      background: #fff;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
    }

    button:active { transform: translateY(1px); }

    .drop {
      grid-column: 1 / -1;
      min-height: 58px;
      color: #fff;
      background: #132b5e;
      letter-spacing: .5px;
    }

    @media (max-height: 650px) {
      .game { gap: 7px; }
      .box { padding: 8px 6px; }
      button { padding: 12px 10px; }
      .drop { min-height: 50px; }
    }
  </style>
</head>
<body>
  <a href="https://mycathost.cz/minihry" class="back">← Back</a>

  <main class="game">
    <section class="hud">
      <div class="box">Score: <span id="score">0</span></div>
      <div class="box">Combo: <span id="combo">0</span></div>
      <div class="box">Best: <span id="best">0</span></div>
    </section>

    <section class="arena" id="arena">
      <div class="message" id="message">Stack Tower<br>Stiskni START a zastav blok co nejpřesněji.</div>
    </section>

    <section class="controls">
      <button type="button" onclick="startGame()">START</button>
      <button type="button" onclick="restartGame()">RESET</button>
      <button class="drop" type="button" onclick="dropBlock()">DROP / SPACE</button>
    </section>
  </main>

  <script>
    const arena = document.getElementById('arena');
    const message = document.getElementById('message');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const bestEl = document.getElementById('best');

    let blocks = [];
    let active = null;
    let score = 0;
    let combo = 0;
    let speed = 2.5;
    let direction = 1;
    let running = false;
    let frameId = 0;
    let best = Number(localStorage.getItem('stackTowerBest') || 0);

    bestEl.textContent = best;

    function arenaSize() {
      return {
        width: arena.clientWidth,
        height: arena.clientHeight
      };
    }

    function startGame() {
      if (running) return;
      restartGame();
    }

    function restartGame() {
      cancelAnimationFrame(frameId);
      arena.querySelectorAll('.block, .cut').forEach(el => el.remove());

      blocks = [];
      active = null;
      score = 0;
      combo = 0;
      speed = 2.5;
      direction = 1;
      running = true;

      scoreEl.textContent = score;
      comboEl.textContent = combo;
      message.classList.add('hidden');

      const size = arenaSize();
      const baseWidth = Math.min(250, size.width * .64);
      const base = createBlock((size.width - baseWidth) / 2, size.height - 46, baseWidth);
      blocks.push(base);
      spawnMovingBlock();
      frameId = requestAnimationFrame(loop);
    }

    function createBlock(x, y, width) {
      const el = document.createElement('div');
      el.className = 'block';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = width + 'px';
      arena.appendChild(el);
      return { el, x, y, width };
    }

    function spawnMovingBlock() {
      const last = blocks[blocks.length - 1];
      const size = arenaSize();
      const y = last.y - 38;

      if (y < 18) {
        shiftTowerDown();
      }

      const spawnY = Math.max(18, blocks[blocks.length - 1].y - 38);
      const x = direction > 0 ? 0 : size.width - last.width;
      active = createBlock(x, spawnY, last.width);
    }

    function shiftTowerDown() {
      blocks.forEach(block => {
        block.y += 38;
        block.el.style.top = block.y + 'px';
      });
    }

    function loop() {
      if (!running || !active) return;

      const size = arenaSize();
      active.x += speed * direction;

      if (active.x <= 0) {
        active.x = 0;
        direction = 1;
      }

      if (active.x + active.width >= size.width) {
        active.x = size.width - active.width;
        direction = -1;
      }

      active.el.style.left = active.x + 'px';
      frameId = requestAnimationFrame(loop);
    }

    function dropBlock() {
      if (!running || !active) return;

      const last = blocks[blocks.length - 1];
      const left = Math.max(active.x, last.x);
      const right = Math.min(active.x + active.width, last.x + last.width);
      const overlap = right - left;

      if (overlap <= 4) {
        endGame();
        return;
      }

      const perfect = Math.abs(active.x - last.x) <= 5;
      const cutLeft = active.x < left ? active.x : right;
      const cutWidth = active.width - overlap;

      if (!perfect && cutWidth > 3) {
        createCutPiece(cutLeft, active.y, cutWidth, active.el.style.background);
      }

      active.x = perfect ? last.x : left;
      active.width = perfect ? last.width : overlap;
      active.el.style.left = active.x + 'px';
      active.el.style.width = active.width + 'px';

      blocks.push(active);
      active = null;

      combo = perfect ? combo + 1 : 0;
      score += perfect ? 3 + combo : 1;
      speed += perfect ? .08 : .16;

      scoreEl.textContent = score;
      comboEl.textContent = combo;

      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('stackTowerBest', best);
      }

      spawnMovingBlock();
    }

    function createCutPiece(x, y, width, color) {
      const el = document.createElement('div');
      el.className = 'cut';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = width + 'px';
      el.style.background = color || 'linear-gradient(180deg, #fff36e, #ff9f43)';
      arena.appendChild(el);
      setTimeout(() => el.remove(), 650);
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(frameId);

      if (active) {
        active.el.remove();
        active = null;
      }

      let rank = 'Dobrý pokus';
      if (score >= 18) rank = 'Stavitel';
      if (score >= 35) rank = 'Tower master';

      message.classList.remove('hidden');
      message.innerHTML = 'Konec hry!<br>Score: ' + score + '<br>Rank: ' + rank;
    }

    window.addEventListener('keydown', event => {
      if (event.key === 'Enter') startGame();
      if (event.key === 'r' || event.key === 'R') restartGame();
      if (event.key === ' ') {
        event.preventDefault();
        dropBlock();
      }
    });

    window.addEventListener('resize', () => {
      if (!running) return;
      restartGame();
    });
  </script>
</body>
</html>
