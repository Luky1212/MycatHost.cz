<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reaction Hunter</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      height: 100dvh; /* mobile safe viewport */
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a8d8ff, #d0ecff);
      color: #fff;
      touch-action: manipulation; /* faster taps */
    }

    .back {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
      z-index: 10;
      padding: 10px 14px; /* larger tap target */
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .circle-bg {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      pointer-events: none;
    }
    .bg1 { width: 45vw; height: 45vw; background: pink; top: 8%; left: 8%; }
    .bg2 { width: 30vw; height: 30vw; background: yellow; top: 65%; left: 15%; }
    .bg3 { width: 38vw; height: 38vw; background: lightgreen; top: 25%; left: 65%; }
    .bg4 { width: 28vw; height: 28vw; background: orange; top: 70%; left: 70%; }

    .hud {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(12px + env(safe-area-inset-bottom)); /* move down for thumbs */
      text-align: center;
      z-index: 5;
      width: min(92vw, 520px);
    }

    .box {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 14px;
      font-size: clamp(16px, 3.6vw, 22px);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .play-area {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .target {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      animation: pop 0.15s ease-out;
      will-change: transform, opacity;
    }

    @keyframes pop {
      from { transform: scale(0.4); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .start-btn {
      margin-top: 10px;
      padding: 14px 22px; /* bigger for touch */
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: clamp(16px, 4vw, 18px);
      width: 100%;
    }
  </style>
</head>
<body>

<a href="https://mycathost.cz/minihry" class="back">← Back</a>

<div class="circle-bg bg1"></div>
<div class="circle-bg bg2"></div>
<div class="circle-bg bg3"></div>
<div class="circle-bg bg4"></div>

<div class="hud">
  <div class="row">
    <div class="box">Score: <span id="score">0</span></div>
    <div class="box">Avg: <span id="reaction">0</span> ms</div>
    <div class="box">Missed: <span id="missed">0</span></div>
  </div>
  <div class="box" id="endText" style="display:none"></div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<div class="play-area" id="area"></div>

<script>
let score = 0;
let missed = 0;
let reactions = [];
let gameRunning = false;
let timeouts = [];
let gameTimer = null;
let activeTargets = 0;
const MAX_TARGETS = 2; // limit for mobile clarity

function resetGame() {
  timeouts.forEach(t => clearTimeout(t));
  clearTimeout(gameTimer);
  timeouts = [];
  activeTargets = 0;
  document.getElementById('area').innerHTML = '';
}

function startGame() {
  resetGame();

  score = 0;
  missed = 0;
  reactions = [];
  gameRunning = true;

  document.getElementById('score').innerText = 0;
  document.getElementById('missed').innerText = 0;
  document.getElementById('reaction').innerText = 0;
  document.getElementById('endText').style.display = 'none';

  spawnLoop();
  gameTimer = setTimeout(endGame, 30000);
}

function spawnLoop() {
  if (!gameRunning) return;

  let delay = Math.random() * 1200 + 400; // a bit faster but capped by MAX_TARGETS
  let t = setTimeout(() => {
    if (activeTargets < MAX_TARGETS) spawnTarget();
    spawnLoop();
  }, delay);

  timeouts.push(t);
}

function spawnTarget() {
  const area = document.getElementById('area');
  const target = document.createElement('div');

  let size = Math.random() * 70 + 55; // bigger for touch (55–125px)
  const pad = 8;
  let x = Math.random() * (window.innerWidth - size - pad*2) + pad;
  let y = Math.random() * (window.innerHeight - size - pad*2) + pad;

  target.classList.add('target');
  target.style.width = size + 'px';
  target.style.height = size + 'px';
  target.style.left = x + 'px';
  target.style.top = y + 'px';

  let isFake = Math.random() < 0.2;
  target.style.background = isFake ? 'red' : 'lime';

  let startTime = performance.now();
  activeTargets++;

  const hit = () => {
    if (!gameRunning) return;

    if (isFake) {
      score -= 2;
    } else {
      let reaction = Math.round(performance.now() - startTime);
      reactions.push(reaction);
      let avg = Math.round(reactions.reduce((a,b)=>a+b,0)/reactions.length);
      document.getElementById('reaction').innerText = avg;
      score += Math.round(220 / (size / 60));
    }

    document.getElementById('score').innerText = score;
    if (target.parentNode) target.remove();
    activeTargets = Math.max(0, activeTargets - 1);
  };

  // pointer events = unify mouse + touch
  target.addEventListener('pointerdown', (e) => { e.preventDefault(); hit(); }, {passive:false});

  area.appendChild(target);

  let t = setTimeout(() => {
    if (area.contains(target)) {
      target.remove();
      missed++;
      document.getElementById('missed').innerText = missed;
      activeTargets = Math.max(0, activeTargets - 1);
    }
  }, 1000);

  timeouts.push(t);
}

function endGame() {
  gameRunning = false;
  resetGame();

  let avg = reactions.length
    ? Math.round(reactions.reduce((a,b)=>a+b,0)/reactions.length)
    : 0;

  let rank = "🐢 slow";
  if (avg < 300) rank = "⚡ fast";
  if (avg < 200) rank = "🔥 insane";

  const endText = document.getElementById('endText');
  endText.style.display = 'block';
  endText.innerText = `Konec hry! Score: ${score} | Avg: ${avg} ms | Rank: ${rank}`;
}
</script>

</body>
</html>
