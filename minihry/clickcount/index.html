<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">

  <!-- FIX PRO MOBIL -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Click Counter Game</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a8d8ff, #d0ecff);
      overflow: hidden;

      /* FIX PRO TOUCH */
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.7;
      pointer-events: none;
    }

    .circle1 { width: 300px; height: 300px; background: pink; top: 10%; left: 10%; }
    .circle2 { width: 200px; height: 200px; background: yellow; top: 60%; left: 20%; }
    .circle3 { width: 250px; height: 250px; background: lightgreen; top: 30%; left: 70%; }
    .circle4 { width: 180px; height: 180px; background: orange; top: 70%; left: 70%; }
    .circle5 { width: 220px; height: 220px; background: purple; top: 20%; left: 50%; }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: #fff;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      margin: 15px;
      border-radius: 20px;
      font-size: 40px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .label {
      font-size: 20px;
      margin-bottom: 5px;
    }

    button {
      padding: 20px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #ffffff;
      color: #333;
      margin-top: 20px;

      /* TOUCH FIX */
      touch-action: manipulation;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>

<!-- FUNKČNÍ BACK ODKAZ -->
<a href="https://mycathost.cz/minihry" class="back">← Back</a>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>
<div class="circle circle4"></div>
<div class="circle circle5"></div>

<div class="container">
  <div>
    <div class="label">CLICKS PER SECOND</div>
    <div id="cps" class="box">0</div>
  </div>

  <div>
    <div class="label">TOTAL CLICKS</div>
    <div id="total" class="box">0</div>
  </div>

  <button id="clickBtn">KLIKNI</button>
</div>

<script>
let clicks = 0;
let totalClicks = 0;

const btn = document.getElementById("clickBtn");

// POINTER místo onclick (lepší pro mobil)
btn.addEventListener("pointerdown", () => {
  clicks++;
  totalClicks++;
  document.getElementById('total').innerText = totalClicks;
});

setInterval(() => {
  document.getElementById('cps').innerText = clicks;
  clicks = 0;
}, 1000);
</script>

</body>
</html>
