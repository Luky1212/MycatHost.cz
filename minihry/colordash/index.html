<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Color Dash</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 238, 118, 0.85), transparent 28%),
        radial-gradient(circle at 78% 18%, rgba(76, 216, 255, 0.75), transparent 27%),
        radial-gradient(circle at 22% 82%, rgba(255, 115, 170, 0.75), transparent 30%),
        linear-gradient(135deg, #5b7cff, #37d6b5);
      color: #fff;
      touch-action: manipulation;
      user-select: none;
    }

    .back {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
      z-index: 20;
      padding: 10px 14px;
      background: rgba(0,0,0,0.22);
      border-radius: 10px;
      backdrop-filter: blur(8px);
    }

    .game {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding:
        calc(58px + env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        calc(14px + env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      z-index: 2;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      width: min(620px, 100%);
      margin: 0 auto;
    }

    .box {
      background: rgba(255,255,255,0.21);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: 0 12px 28px rgba(24, 43, 92, 0.16);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 11px 10px;
      text-align: center;
      font-size: clamp(14px, 3.3vw, 20px);
      font-weight: 700;
    }

    .arena {
      position: relative;
      width: min(620px, 100%);
      min-height: 0;
      margin: 0 auto;
      border-radius: 22px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 18px 40px rgba(20, 40, 90, 0.2);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .lane {
      position: absolute;
      left: 0;
      right: 0;
      height: 25%;
      border-bottom: 1px solid rgba(255,255,255,0.16);
    }

    .lane:nth-child(1) { top: 0; }
    .lane:nth-child(2) { top: 25%; }
    .lane:nth-child(3) { top: 50%; }
    .lane:nth-child(4) { top: 75%; border-bottom: 0; }

    .runner {
      position: absolute;
      left: clamp(26px, 9vw, 58px);
      width: clamp(42px, 11vw, 64px);
      height: clamp(42px, 11vw, 64px);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 14px 26px rgba(0,0,0,0.2);
      transition: top 0.12s ease;
      z-index: 3;
    }

    .runner::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: #27d37f;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.12);
    }

    .orb {
      position: absolute;
      right: -70px;
      width: clamp(38px, 10vw, 58px);
      height: clamp(38px, 10vw, 58px);
      border-radius: 50%;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18), inset 0 -7px 0 rgba(0,0,0,0.15);
      z-index: 2;
    }

    .orb.good { background: #2eff8b; }
    .orb.bad { background: #ff3f62; }
    .orb.bonus { background: #ffe65b; }

    .controls {
      width: min(620px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 800;
      color: #18305f;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    button:active { transform: translateY(1px); }

    .start {
      grid-column: 1 / -1;
      background: #132b5e;
      color: #fff;
    }

    .message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 420px);
      padding: 18px;
      text-align: center;
      border-radius: 18px;
      background: rgba(18, 35, 76, 0.76);
      backdrop-filter: blur(12px);
      font-size: clamp(17px, 4vw, 22px);
      font-weight: 800;
      line-height: 1.35;
      z-index: 8;
    }

    .hidden { display: none; }

    @media (max-height: 620px) {
      .game { gap: 8px; }
      .box { padding: 8px 7px; }
      button { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<a href="https://mycathost.cz/minihry" class="back">← Back</a>

<main class="game">
  <section class="hud">
    <div class="box">Score: <span id="score">0</span></div>
    <div class="box">Time: <span id="time">30</span>s</div>
    <div class="box">Lives: <span id="lives">3</span></div>
  </section>

  <section class="arena" id="arena" aria-label="Color Dash game area">
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="runner" id="runner"></div>
    <div class="message" id="message">Sbírej zelené a žluté koule. Červeným se vyhni.</div>
  </section>

  <section class="controls">
    <button type="button" onclick="moveRunner(-1)">↑ UP</button>
    <button type="button" onclick="moveRunner(1)">↓ DOWN</button>
    <button class="start" type="button" onclick="startGame()">START</button>
  </section>
</main>

<script>
const arena = document.getElementById('arena');
const runner = document.getElementById('runner');
const message = document.getElementById('message');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const livesEl = document.getElementById('lives');

let lane = 1;
let score = 0;
let lives = 3;
let timeLeft = 30;
let running = false;
let speed = 2.7;
let lastSpawn = 0;
let animationId = null;
let timerId = null;
let orbs = [];

function setRunnerPosition() {
  const laneHeight = arena.clientHeight / 4;
  const size = runner.offsetHeight;
  runner.style.top = ((laneHeight * lane) + ((laneHeight - size) / 2)) + 'px';
}

function moveRunner(direction) {
  lane = Math.max(0, Math.min(3, lane + direction));
  setRunnerPosition();
}

function resetGame() {
  cancelAnimationFrame(animationId);
  clearInterval(timerId);
  orbs.forEach(orb => orb.el.remove());
  orbs = [];
  lastSpawn = 0;
}

function startGame() {
  resetGame();
  lane = 1;
  score = 0;
  lives = 3;
  timeLeft = 30;
  speed = 2.7;
  running = true;

  scoreEl.innerText = score;
  livesEl.innerText = lives;
  timeEl.innerText = timeLeft;
  message.classList.add('hidden');
  setRunnerPosition();

  timerId = setInterval(() => {
    timeLeft--;
    timeEl.innerText = timeLeft;
    speed += 0.08;
    if (timeLeft <= 0) endGame();
  }, 1000);

  animationId = requestAnimationFrame(gameLoop);
}

function spawnOrb(now) {
  const types = ['good', 'good', 'good', 'bad', 'bonus'];
  const type = types[Math.floor(Math.random() * types.length)];
  const orbLane = Math.floor(Math.random() * 4);
  const laneHeight = arena.clientHeight / 4;
  const orb = document.createElement('div');

  orb.className = 'orb ' + type;
  arena.appendChild(orb);

  const size = orb.offsetWidth;
  const y = (laneHeight * orbLane) + ((laneHeight - size) / 2);
  const item = {
    el: orb,
    x: arena.clientWidth + 70,
    y,
    lane: orbLane,
    type,
    hit: false
  };

  orb.style.top = y + 'px';
  orbs.push(item);
  lastSpawn = now;
}

function gameLoop(now) {
  if (!running) return;

  if (!lastSpawn || now - lastSpawn > Math.max(430, 1000 - score * 5)) {
    spawnOrb(now);
  }

  const runnerRect = runner.getBoundingClientRect();

  orbs = orbs.filter(orb => {
    orb.x -= speed;
    orb.el.style.transform = 'translateX(' + (-arena.clientWidth - 90 + orb.x) + 'px)';

    const orbRect = orb.el.getBoundingClientRect();
    const overlaps = !(
      runnerRect.right < orbRect.left ||
      runnerRect.left > orbRect.right ||
      runnerRect.bottom < orbRect.top ||
      runnerRect.top > orbRect.bottom
    );

    if (overlaps && !orb.hit) {
      orb.hit = true;
      collectOrb(orb);
      orb.el.remove();
      return false;
    }

    if (orb.x < -80) {
      if (orb.type === 'good') loseLife();
      orb.el.remove();
      return false;
    }

    return true;
  });

  animationId = requestAnimationFrame(gameLoop);
}

function collectOrb(orb) {
  if (orb.type === 'bad') {
    loseLife();
    return;
  }

  score += orb.type === 'bonus' ? 5 : 1;
  scoreEl.innerText = score;
}

function loseLife() {
  lives--;
  livesEl.innerText = lives;
  arena.animate(
    [{ transform: 'translateX(0)' }, { transform: 'translateX(-7px)' }, { transform: 'translateX(7px)' }, { transform: 'translateX(0)' }],
    { duration: 180 }
  );

  if (lives <= 0) endGame();
}

function endGame() {
  if (!running) return;
  running = false;
  resetGame();

  let rank = 'Dobry pokus';
  if (score >= 18) rank = 'Rychly sberac';
  if (score >= 32) rank = 'Color master';

  message.classList.remove('hidden');
  message.innerText = 'Konec hry! Score: ' + score + ' | Rank: ' + rank;
}

window.addEventListener('resize', setRunnerPosition);
window.addEventListener('keydown', (event) => {
  if (event.key === 'ArrowUp' || event.key.toLowerCase() === 'w') moveRunner(-1);
  if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') moveRunner(1);
  if (event.key === 'Enter' || event.key === ' ') startGame();
});

setRunnerPosition();
</script>

</body>
</html>
