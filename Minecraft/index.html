<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MycatHost.cz – Minecraft Hosting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-right-logo {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
        .top-right-logo img {
            width: 32px;
            height: 32px;
        }

        .header {
            background-color: #007BFF;
            padding: 20px;
            text-align: left;
        }
        .header h1 {
            color: white;
            display: inline;
            font-size: 28px;
            margin: 0;
        }
        .header h1 span {
            color: red;
        }

        .nav {
            background-color: #333;
            padding: 14px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }
        .nav a {
            position: relative;
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: flex-end;
            justify-content: center;
            width: 220px;
            height: 130px;
            border-radius: 10px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 20px;
        }
        .nav a span {
            display: inline-block;
            width: 100%;
            text-align: center;
            background: rgba(0,0,0,0.45);
            padding: 8px 6px;
        }
        .nav a:hover {
            transform: translateY(-4px);
            transition: transform 0.15s ease;
        }

        .nav a.basic { background-image: url('https://store-images.s-microsoft.com/image/apps.60323.14294656681058683.4d17bdd8-7026-429a-846f-cf7836bc9e56.a69e6905-8926-4a48-b243-14a039b97aae?mode=scale&q=90&h=1080&w=1920&format=jpg'); }
        .nav a.beefy { background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fres.cloudinary.com%2Funitedprint-com-se%2Fimage%2Fupload%2Fc_fill%2Cf_auto%2Ch_482%2Cw_700%2Fv1%2Fmaster%2F002-0_Teaser-Dummy_cpkpfp&f=1&nofb=1&ipt=cdcc90edf3b77f606f8ef9d56a052437978f6374535b935298c8ff76df7f20a6'); }
        .nav a.about { background-image: url('https://iregister.al/wp-content/uploads/2019/04/server-hosting.jpeg'); }
        .nav a.dalsi { background-image: url('https://thumbs.dreamstime.com/b/man-fix-server-network-data-center-room-67131350.jpg'); }

        .content {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        .content h2 {
            color: #00BFFF;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .content p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        form {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            max-width: 600px;
            margin: 30px auto;
        }
        form select, form button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        form select {
            background-color: #333;
            color: white;
        }
        form button {
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }
        form button:hover {
            background-color: #0056b3;
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: #ccc;
            margin-top: auto;
            font-size: 14px;
            background: #111;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="top-right-logo">
        <img src="favicon-32x32.png" alt="Logo">
    </div>
    <h1><a href="https://mycathost.cz" style="color: white; text-decoration: none;">Mycat<span>Host</span></a></h1>
</div>

<div class="nav">
    <a href="https://mycathost.cz/Minecraft/" class="basic"><span>Minecraft</span></a>
    <a href="https://mycathost.cz/3dtisk/" class="beefy"><span>3D Tisk</span></a>
    <a href="https://mycathost.cz/AboutUs/" class="about"><span>O nás</span></a>
    <a href="https://mycathost.cz/DalsiSluzby/" class="dalsi"><span>Další služby</span></a>
</div>

<div class="content">
    <h2>Minecraft Hosting na míru</h2>
    <p>U nás si můžete jednoduše vybrat konfiguraci Minecraft serveru podle vašich potřeb.</p>

    <form id="serverForm">

        <select id="game">
            <option selected disabled>Vyberte verzi Minecraftu</option>
            <option>1.21</option>
            <option>1.20</option>
            <option>1.19</option>
        </select>

        <select id="ram">
            <option selected disabled>Vyberte RAM</option>
            <option>2 GB</option>
            <option>4 GB</option>
            <option>6 GB</option>
            <option>8 GB</option>
            <option>10 GB</option>
            <option>12 GB</option>
            <option>14 GB</option>
            <option>16 GB</option>
        </select>

        <select id="players">
            <option selected disabled>Počet hráčů</option>
            <option>5</option>
            <option>10</option>
            <option>20</option>
            <option>40</option>
        </select>

        <select id="mods">
            <option selected disabled>Modifikace</option>
            <option>Ne</option>
            <option>Ano</option>
        </select>

        <button type="button" onclick="sendEmail()">Odeslat konfiguraci</button>

        <!-- ZOBRAZENÍ CENY -->
        <div id="priceDisplay" style="margin-top:10px; font-size:20px; font-weight:bold; color:#00BFFF; display:none;">
            Cena / měsíc: 0 Kč
        </div>

    </form>
</div>

<div class="footer">
    © <span id="year"></span> MycatHost.cz
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const ramSelect = document.getElementById("ram");
const playersSelect = document.getElementById("players");
const modsSelect = document.getElementById("mods");
const priceDisplay = document.getElementById("priceDisplay");

function calculatePrice() {

    if (!ramSelect.value || !playersSelect.value || !modsSelect.value ||
        ramSelect.value.includes("Vyberte") ||
        playersSelect.value.includes("Vyberte") ||
        modsSelect.value.includes("Vyberte")) {
        priceDisplay.style.display = "none";
        return;
    }

    const ram = parseInt(ramSelect.value);
    let price = 35 + ((ram - 2) / 2) * 5;

    const players = parseInt(playersSelect.value);
    if (players === 5 || players === 10) price += 5;
    else if (players > 10) price += 10;

    if (modsSelect.value === "Ano") price += 5;

    priceDisplay.textContent = "Cena / měsíc: " + price + " Kč";
    priceDisplay.style.display = "block";
}

ramSelect.addEventListener("change", calculatePrice);
playersSelect.addEventListener("change", calculatePrice);
modsSelect.addEventListener("change", calculatePrice);

function sendEmail() {

    const game = document.getElementById("game").value;
    const ram = ramSelect.value;
    const players = playersSelect.value;
    const mods = modsSelect.value;

    if (!game || !ram || !players || !mods ||
        game.includes("Vyberte") || ram.includes("Vyberte") ||
        players.includes("Vyberte") || mods.includes("Vyberte")) {
        alert("⚠️ Vyplňte prosím všechny položky.");
        return;
    }

    calculatePrice();

    const subject = encodeURIComponent("Nová konfigurace serveru");
    const body = encodeURIComponent(
        `Verze: ${game}
RAM: ${ram}
Počet hráčů: ${players}
Modifikace: ${mods}
${priceDisplay.textContent}`
    );

    window.location.href = `mailto:klarzygame@gmail.com?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
